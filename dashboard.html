<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparezy Competitive Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292e;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
      background: #f6f8fa;
    }
    #content {
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 40px 48px;
    }
    h1 { font-size: 2em; border-bottom: 2px solid #e1e4e8; padding-bottom: 12px; }
    h2 { font-size: 1.4em; border-bottom: 1px solid #e1e4e8; padding-bottom: 8px; margin-top: 32px; color: #0366d6; }
    h3 { font-size: 1.1em; margin-top: 24px; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 0.9em; }
    th { background: #f1f8ff; text-align: left; }
    th, td { border: 1px solid #dfe2e5; padding: 8px 12px; }
    tr:nth-child(even) { background: #f6f8fa; }
    td strong, th { font-weight: 600; }
    em { color: #6a737d; font-size: 0.88em; }
    hr { border: none; border-top: 1px solid #e1e4e8; margin: 32px 0; }
    code { background: #f3f4f6; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
    #last-updated { color: #6a737d; font-size: 0.9em; }
    #reload-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #0366d6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85em;
    }
    #reload-btn:hover { background: #0256c0; }
  </style>
</head>
<body>
  <button id="reload-btn" onclick="loadDashboard()">↻ Refresh</button>
  <div id="content">Loading...</div>
  <script>
    async function loadDashboard() {
      const res = await fetch('comparezy-competitive-dashboard.md?t=' + Date.now());
      const text = await res.text();
      document.getElementById('content').innerHTML = marked.parse(text);
    }
    loadDashboard();
  </script>
</body>
</html>
